<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Zoho CRM - LeadReach</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: #172554;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2f7;
      }

      .crm-shell {
        display: grid;
        grid-template-columns: 238px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px 10px;
        color: #dbeafe;
        background: #243b67;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 32px;
        margin-bottom: 16px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border-radius: 8px;
        color: #ffffff;
        background: #2563eb;
      }

      .nav-item,
      .teamspace,
      .search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 30px;
        border-radius: 6px;
      }

      .nav-item {
        padding: 7px 8px;
        font-size: 14px;
        color: #eef4ff;
      }

      .nav-item.active {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.12);
        font-weight: 700;
      }

      .divider {
        height: 1px;
        margin: 12px -10px 2px;
        background: rgba(255, 255, 255, 0.16);
      }

      .teamspace {
        justify-content: space-between;
        padding: 8px 4px;
        font-size: 14px;
        font-weight: 700;
      }

      .search-box {
        padding: 0 10px;
        border: 1px solid rgba(203, 213, 225, 0.26);
        color: #a7b6d4;
      }

      .module-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 10px;
      }

      .content {
        display: grid;
        grid-template-rows: 55px minmax(0, 1fr);
        min-width: 0;
        background: #ffffff;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #dbe3f0;
        padding: 0 14px 0 16px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .global-search {
        width: min(34vw, 290px);
        height: 32px;
        border: 0;
        border-radius: 7px;
        padding: 0 12px;
        color: #64748b;
        background: #eef3fb;
      }

      .icon-button {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border: 1px solid #d8e0ee;
        border-radius: 7px;
        color: #32568c;
        background: #ffffff;
      }

      .iframe-wrap {
        min-height: 0;
        background: #ffffff;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 900px) {
        .crm-shell {
          grid-template-columns: 64px minmax(0, 1fr);
        }

        .brand span,
        .nav-item span,
        .teamspace,
        .search-box {
          display: none;
        }

        .nav-item {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="crm-shell">
      <aside class="sidebar" aria-label="Zoho CRM local shell">
        <div class="brand">
          <div class="brand-mark">∞</div>
          <span>Zoho CRM</span>
        </div>
        <div class="nav-item"><span>⌂</span><span>Home</span></div>
        <div class="nav-item"><span>▥</span><span>Reports</span></div>
        <div class="nav-item"><span>◔</span><span>Analytics</span></div>
        <div class="nav-item"><span>▣</span><span>My Requests</span></div>
        <div class="nav-item"><span>▤</span><span>Agents</span></div>
        <div class="divider"></div>
        <div class="teamspace"><span>CRM Teamspace</span><span>⌄</span></div>
        <div class="search-box">Search</div>
        <div class="module-list">
          <div class="nav-item"><span>▰</span><span>Inventory</span></div>
          <div class="nav-item"><span>▰</span><span>Support</span></div>
          <div class="nav-item"><span>▰</span><span>Integrations</span></div>
          <div class="nav-item active"><span>▣</span><span>LeadReach</span></div>
          <div class="nav-item"><span>⌁</span><span>Services</span></div>
          <div class="nav-item"><span>▰</span><span>Projects</span></div>
        </div>
      </aside>

      <section class="content">
        <header class="topbar">
          <div class="title">LeadReach</div>
          <div class="toolbar">
            <input class="global-search" type="search" value="Search records" aria-label="Search records" readonly />
            <div class="icon-button">+</div>
            <div class="icon-button">⚙</div>
          </div>
        </header>
        <div class="iframe-wrap">
          <iframe
            title="LeadReach Zoho local iframe"
            src="/#/dashboard?zohoLocal=1"
            allow="clipboard-read; clipboard-write"
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
