<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCTa7jaaUxlwuw00k70VN8cUC_AFRMSdlRuA&s" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zoho</title>
    <script>
      (function loadZohoWidgetSdk() {
        const isLocalHost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
        const params = new URLSearchParams(window.location.search);
        const script = document.createElement('script');

        script.id = 'zoho-widget-javascript-sdk';
        script.src =
          isLocalHost || params.has('zohoLocal')
            ? '/zoho-local-sdk.js'
            : 'https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js';
        script.dataset.sdkLoadState = 'loading';
        script.onload = function () {
          script.dataset.sdkLoadState = 'loaded';
          console.info('[LeadReach CRM]', 'Zoho SDK script loaded from index.html', {
            src: script.src,
            hasZoho: Boolean(window.ZOHO),
            inIframe: window.self !== window.top,
            referrer: document.referrer,
          });
        };
        script.onerror = function () {
          script.dataset.sdkLoadState = 'error';
          console.error('[LeadReach CRM]', 'Zoho SDK script failed from index.html', {
            src: script.src,
            inIframe: window.self !== window.top,
            referrer: document.referrer,
          });
        };

        console.info('[LeadReach CRM]', 'Zoho SDK script selected', {
          src: script.src,
          local: isLocalHost || params.has('zohoLocal'),
          href: window.location.href,
          referrer: document.referrer,
          inIframe: window.self !== window.top,
        });
        document.head.appendChild(script);
      })();
    </script>
    <script>
      window.leadReachStoreZohoContext = async function leadReachStoreZohoContext(pageLoadData) {
        const zoho = window.ZOHO;
        const context = {
          pageLoad: pageLoadData || null,
          isIframe: window.self !== window.top,
          referrer: document.referrer || '',
          storedAt: new Date().toISOString(),
        };

        localStorage.setItem('zoho_crm_context', JSON.stringify(context));
        console.info('[LeadReach CRM]', 'Zoho CRM context captured', context);

        if (!zoho || !zoho.CRM || !zoho.CRM.CONFIG) {
          console.warn('[LeadReach CRM]', 'ZOHO.CRM.CONFIG unavailable while storing context', {
            hasZoho: Boolean(zoho),
            hasCrm: Boolean(zoho && zoho.CRM),
          });
          return context;
        }

        const requests = [
          ['zoho_crm_user_response', zoho.CRM.CONFIG.getCurrentUser],
          ['zoho_crm_org_response', zoho.CRM.CONFIG.getOrgInfo],
        ];

        await Promise.all(
          requests.map(async ([storageKey, request]) => {
            if (typeof request !== 'function') {
              return;
            }

            try {
              const payload = await request.call(zoho.CRM.CONFIG);
              localStorage.setItem(storageKey, JSON.stringify(payload || {}));
              console.info('[LeadReach CRM]', storageKey + ' stored', payload || {});
            } catch (error) {
              localStorage.setItem(storageKey + '_error', error && error.message ? error.message : String(error));
              console.error('[LeadReach CRM]', storageKey + ' failed', error);
            }
          }),
        );

        window.dispatchEvent(new Event('zoho-crm-context-updated'));
        return context;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
